workflows:
  phantom-ios:
    name: Phantom iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      groups:
        - app_store_connect
      vars:
        BUNDLE_ID: "com.alphainception.phantom"
        APP_NAME: Phantom

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true

    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Set up code signing
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos || true

      - name: Flutter build iOS
        script: |
          flutter build ipa \
            --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - andre@alphainception.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - tester int

  phantom-ios-dev:
    name: Phantom iOS (Dev)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      groups:
        - app_store_connect
      vars:
        BUNDLE_ID: "com.alphainception.phantom"

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Set up signing
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build
        script: |
          flutter build ipa \
            --debug \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - andre@alphainception.com
        notify:
          success: true
          failure: true
